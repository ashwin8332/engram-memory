name: PR Conflict Scanner

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install engram-mcp-client
        run: pip install engram-mcp-client
      - name: Query workspace for conflicts
        env:
          ENGRAM_WORKSPACE: ${{ secrets.ENGRAM_WORKSPACE }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: engram search --workspace "$ENGRAM_WORKSPACE" "$PR_TITLE"
      - name: Post result
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment $PR_NUMBER -b "Conflict scan complete"